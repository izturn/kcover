apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kcover.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kcover.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app: {{ include "kcover.fullname" . }}-controller
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ include "kcover.fullname" . }}-controller
    spec:
      {{- with .Values.controller.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kcover.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          image: {{ template "controller.image" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          {{- with .Values.controller.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.controller.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            # NODE_NAME is the canonical env var. FAST_RECOVERY_NODE_NAME remains
            # backward-compatible in code for older deployments during migration.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
