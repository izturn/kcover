apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kcover.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kcover.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ include "kcover.fullname" . }}-agent
  template:
    metadata:
      {{- with .Values.agent.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ include "kcover.fullname" . }}-agent
    spec:
      {{- with .Values.agent.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kcover.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.agent.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          securityContext:
            {{- toYaml .Values.agent.securityContext | nindent 12 }}
          image: {{ template "agent.image" . }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - --config={{ .Values.agent.config.path }}
          {{- with .Values.agent.args }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            # NODE_NAME is the canonical env var. FAST_RECOVERY_NODE_NAME remains
            # backward-compatible in code for older deployments during migration.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            - name: agent-config
              mountPath: {{ dir .Values.agent.config.path }}
              readOnly: true
          {{- with .Values.agent.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "kcover.agentConfigMapName" . }}
        {{- with .Values.agent.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
